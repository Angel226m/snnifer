version: '3.8'

services:
  # PostgreSQL Database - Single source of truth
  db:
    image: postgres:15-alpine
    container_name: learnwithgaray_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-learnwithgaray}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d learnwithgaray"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: learnwithgaray_backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-learnwithgaray}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      CORS_ORIGINS: http://localhost:3000,http://frontend:3000,http://localhost:5000,http://sniffer:5000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 3

  # SvelteKit Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: learnwithgaray_frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => { if (r.statusCode !== 200) throw new Error(r.statusCode); })"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Network Sniffer - Traffic Monitor (separate folder, uses backend DB)
  sniffer:
    build:
      context: ./sniffer
      dockerfile: Dockerfile
    container_name: learnwithgaray_sniffer
    ports:
      - "5000:5000"
    networks:
      - app_network
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      PYTHONUNBUFFERED: 1
      PYTHONIOENCODING: utf-8
      SNIFFER_DB_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-learnwithgaray}
      BACKEND_URL: http://backend:8000
    cap_add:
      - NET_ADMIN
      - NET_RAW
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  app_network:
    driver: bridge
